<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="'Latin Modern Roman', 'Computer Modern', Georgia, serif">
  <defs>
    <marker id="arrowhead" markerWidth="9" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#3a3a3a"/>
    </marker>
    <style>
      .prob-label { font-size: 16px; fill: #2a5fa0; font-style: italic; }
      .state-label { font-size: 17px; fill: #222; font-style: italic; }
      .payoff { font-size: 15px; fill: #333; font-style: italic; }
      .bracket { fill: none; stroke: #444; stroke-width: 1.5; stroke-linecap: round; }
      .dots-v { font-size: 20px; fill: #666; text-anchor: middle; }
      .caption-top { font-size: 14px; fill: #333; text-anchor: middle; font-weight: bold; }
      .caption-bot { font-size: 14px; fill: #333; text-anchor: middle; font-weight: bold; }
    </style>
  </defs>

  <!-- Current state dot at t=0 -->
  <circle cx="80" cy="230" r="6" fill="#333"/>

  <!-- Arrows from dot to states -->
  <line x1="86" y1="224" x2="278" y2="72" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="86" y1="228" x2="278" y2="205" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="86" y1="236" x2="278" y2="395" stroke="#3a3a3a" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Probability labels on arrows -->
  <text x="158" y="132" class="prob-label">p₁</text>
  <text x="170" y="212" class="prob-label">p₂</text>
  <text x="152" y="340" class="prob-label">p<tspan font-size="11" baseline-shift="-20%">S</tspan></text>

  <!-- State dots and labels -->
  <circle cx="288" cy="68" r="5" fill="#333"/>
  <text x="303" y="73" class="state-label">ω₁</text>

  <circle cx="288" cy="202" r="5" fill="#333"/>
  <text x="303" y="207" class="state-label">ω₂</text>

  <!-- Vertical dots -->
  <text x="288" y="300" class="dots-v">⋮</text>

  <circle cx="288" cy="392" r="5" fill="#333"/>
  <text x="303" y="397" class="state-label">ω<tspan font-size="12" baseline-shift="-20%">S</tspan></text>

  <!-- ===== Payoff column vectors ===== -->

  <!-- Column 1: payoffs at ω₁ -->
  <path d="M 385,32 Q 375,32 375,42 L 375,118 Q 375,128 385,128" class="bracket"/>
  <text x="400" y="55" class="payoff">X₁₁</text>
  <text x="400" y="81" class="payoff">X₂₁</text>
  <text x="408" y="102" class="dots-v" font-size="15">⋮</text>
  <text x="400" y="122" class="payoff">X<tspan font-size="11" baseline-shift="-20%">N</tspan>₁</text>
  <path d="M 445,32 Q 455,32 455,42 L 455,118 Q 455,128 445,128" class="bracket"/>

  <!-- Column 2: payoffs at ω₂ -->
  <path d="M 385,166 Q 375,166 375,176 L 375,252 Q 375,262 385,262" class="bracket"/>
  <text x="400" y="189" class="payoff">X₁₂</text>
  <text x="400" y="215" class="payoff">X₂₂</text>
  <text x="408" y="236" class="dots-v" font-size="15">⋮</text>
  <text x="400" y="256" class="payoff">X<tspan font-size="11" baseline-shift="-20%">N</tspan>₂</text>
  <path d="M 445,166 Q 455,166 455,176 L 455,252 Q 455,262 445,262" class="bracket"/>

  <!-- Column S: payoffs at ω_S -->
  <path d="M 385,358 Q 375,358 375,368 L 375,444 Q 375,454 385,454" class="bracket"/>
  <text x="400" y="381" class="payoff">X₁<tspan font-size="11" baseline-shift="-20%">S</tspan></text>
  <text x="400" y="407" class="payoff">X₂<tspan font-size="11" baseline-shift="-20%">S</tspan></text>
  <text x="408" y="428" class="dots-v" font-size="15">⋮</text>
  <text x="400" y="448" class="payoff">X<tspan font-size="11" baseline-shift="-20%">NS</tspan></text>
  <path d="M 450,358 Q 460,358 460,368 L 460,444 Q 460,454 450,454" class="bracket"/>

  <!-- Bottom captions -->
  <text x="80" y="475" class="caption-top">current state</text>
  <text x="80" y="493" class="caption-bot">at t = 0</text>

  <text x="195" y="475" class="caption-top">transition</text>
  <text x="195" y="493" class="caption-bot">probability</text>

  <text x="310" y="475" class="caption-top">states</text>
  <text x="310" y="493" class="caption-bot">at t = 1</text>

  <text x="440" y="475" class="caption-top">asset payoffs</text>
  <text x="440" y="493" class="caption-bot">at t = 1</text>
</svg>
